name: Release - Upload ZIP

on:
  push:
    tags:
      - 'v*'   # v1.3.0.0 など

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '18.0'

      # packages.config 対応
      - name: NuGet Restore
        run: nuget restore SampleSpeechLiveAgents.slnx

      - name: Build (Release)
        run: msbuild SampleSpeechLiveAgents.slnx `
              /p:Configuration=Release `
          /p:Platform="x64" `
              /t:Build

      # ZIP 作成（タグ名を使用）
      - name: Create ZIP
        run: |
          Compress-Archive `
            -Path SampleSpeechLiveAgents/bin/x64/Release/* `
            -DestinationPath SampleSpeechLiveAgents-${{ github.ref_name }}.zip

      # Release を作成または更新し、ZIP を添付
      - name: Create or Update Release and Upload ZIP
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: SampleSpeechLiveAgents-${{ github.ref_name }}.zip
