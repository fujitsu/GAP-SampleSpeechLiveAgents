name: Build WPF Application

on:
  pull_request:
    branches:
      - main
      - release/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '18.0'

      # ★ 追加：packages.config 用
      - name: NuGet Restore
        run: nuget restore SampleSpeechLiveAgents.slnx

      # 念のため残してもOK（SDK-style project 用）
      - name: dotnet Restore
        run: dotnet restore SampleSpeechLiveAgents.slnx

      - name: Build (Release)
        run: msbuild SampleSpeechLiveAgents.slnx `
              /p:Configuration=Release `
              /p:Platform="x64" `
              /t:Build
